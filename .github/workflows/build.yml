name: Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      DEBUG_KEYSTORE_FILE: debug.keystore

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Decode debug keystore
        env:
          DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        run: echo "$DEBUG_KEYSTORE_BASE64" | base64 -d > debug.keystore

      - name: Build with Gradle
        run: ./gradlew assembleDebug ktlintCheck detekt

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload APK to S3
        if: github.event_name == 'pull_request'
        id: s3_upload
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          S3_KEY="folderviewer/pr-${{ github.event.pull_request.number }}/${{ github.sha }}/$(basename "$APK_PATH")"
          aws s3 cp "$APK_PATH" "s3://$S3_BUCKET/$S3_KEY"
          echo "apk_url=https://$S3_BUCKET.s3.${AWS_DEFAULT_REGION}.amazonaws.com/$S3_KEY" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          APK_URL: ${{ steps.s3_upload.outputs.apk_url }}
        with:
          script: |
            const apkUrl = process.env.APK_URL;
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(apkUrl)}`;
            const marker = '<!-- folderviewer-apk-comment -->';
            const body = [
              marker,
              '## APKダウンロード',
              '',
              '| QRコード | リンク |',
              '|---------|--------|',
              `| ![QR Code](${qrUrl}) | [APKをダウンロード](${apkUrl}) |`,
              '',
              `- Commit: \`${{ github.sha }}\``,
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.data.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
